    <script>
        let chart = null;
        
        // JSONгғҮгғјгӮҝгӮ’иӘӯгҒҝиҫјгҒҝ
        function loadData() {
            try {
                if (typeof dashboardData === 'undefined') {
                    throw new Error('dashboardDataгҒҢе®ҡзҫ©гҒ•гӮҢгҒҰгҒ„гҒҫгҒӣгӮ“');
                }
                console.log('вң“ гғҮгғјгӮҝиӘӯгҒҝиҫјгҒҝжҲҗеҠҹ:', dashboardData);
                return dashboardData;
            } catch (error) {
                console.error('вқҢ гғҮгғјгӮҝиӘӯгҒҝиҫјгҒҝгӮЁгғ©гғј:', error);

                    <div style="color: #e74c3c; padding: 20px; background: #fadbd8; border-radius: 4px;">
                        <strong>гӮЁгғ©гғј:гғҮгғјгӮҝгҒҢиӘӯгҒҝиҫјгӮҒгҒҫгҒӣгӮ“</strong><br>
                        dashboard_data.jsгҒҢdashboard.htmlгҒЁеҗҢгҒҳгғ•гӮ©гғ«гғҖгҒ«гҒӮгӮӢгҒ“гҒЁгӮ’зўәиӘҚгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ
                        <br><br>
                        д»ҘдёӢгҒ®гӮігғһгғігғүгӮ’е®ҹиЎҢгҒ—гҒҰгҒҸгҒ гҒ•гҒ„пјҡ<br>
                        <code style="background: #fff; padding: 5px; display: inline-block; margin: 10px 0;">
                            python excel_to_json.py
                        </code>
                        <br><br>
                        <button onclick="location.reload()" style="padding: 8px 16px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer;">
                            еҶҚеәҰиӘӯгҒҝиҫјгҒҝ
                        </button>
                    </div>
                `;
                return null;
            }
        }
        
        // зҷҫдёҮеҶҶеҚҳдҪҚгҒ§гғ•гӮ©гғјгғһгғғгғҲпјҲгӮ°гғ©гғ•з”Ёпјү
        function formatMillion(value) {
            return Math.round(value / 1000000 * 10) / 10;  // е°Ҹж•°з¬¬1дҪҚгҒҫгҒ§
        }
        
        // еҚғеҶҶеҚҳдҪҚгҒ§гғ•гӮ©гғјгғһгғғгғҲпјҲгғҶгғјгғ–гғ«з”Ёпјү
        function formatThousand(value) {
            return Math.round(value / 1000);
        }
        
        // еүІеҗҲгғ©гғҷгғ«гӮ’жӣҙж–°
        function updatePercentageLabels(data) {
            const wPercent = Math.round(data.w_percentage * 100);
            const cPercent = Math.round(data.c_percentage * 100);
            const bPercent = Math.round(data.b_percentage * 100);
            
            document.getElementById('legendW').textContent = `W ${wPercent}%`;
            document.getElementById('legendC').textContent = `C ${cPercent}%`;
            document.getElementById('legendB').textContent = `B ${bPercent}%`;
            document.getElementById('thW').textContent = `W ${wPercent}% (еҚғеҶҶ)`;
            document.getElementById('thC').textContent = `C ${cPercent}% (еҚғеҶҶ)`;
            document.getElementById('thB').textContent = `B ${bPercent}% (еҚғеҶҶ)`;
        }
        
        // гғҒгғЈгғјгғҲз”ЁгҒ®гғҮгғјгӮҝгӮ»гғғгғҲгӮ’дҪңжҲҗ
        function createChartData(data) {
            const wLabel = `W ${Math.round(data.w_percentage * 100)}%`;
            const cLabel = `C ${Math.round(data.c_percentage * 100)}%`;
            const bLabel = `B ${Math.round(data.b_percentage * 100)}%`;
            const labels = data.labels;
            const statuses = data.statuses;
            const targets = data.targets;
            const actuals = data.actuals;
            const w_forecasts = data.w_forecasts || [];
            const c_forecasts = data.c_forecasts || [];
            const b_forecasts = data.b_forecasts || [];
            
            // гӮ°гғ©гғ•з”ЁгғҮгғјгӮҝпјҲзҷҫдёҮеҶҶеҚҳдҪҚпјү
            const targetData = [];
            const actualData = [];
            const wData = [];
            const cData = [];
            const bData = [];
            
            for (let i = 0; i < labels.length; i++) {
                targetData.push(formatMillion(targets[i]));
                
                if (statuses[i] === "е®ҹзёҫ") {
                    // йҒҺеҺ»гҒ®жңҲпјҡе®ҹзёҫгҒ®гҒҝ
                    actualData.push(formatMillion(actuals[i]));
                    wData.push(null);
                    cData.push(null);
                    bData.push(null);
                } else if (statuses[i] === "иҰӢиҫј") {
                    // иҰӢиҫјгҒ®жңҲпјҡ4ж®өйҡҺ
                    actualData.push(formatMillion(actuals[i]));
                    wData.push(formatMillion(w_forecasts[i]));
                    cData.push(formatMillion(c_forecasts[i]));
                    bData.push(formatMillion(b_forecasts[i]));
                } else {
                    actualData.push(null);
                    wData.push(null);
                    cData.push(null);
                    bData.push(null);
                }
            }
            
            return {
                labels: labels,
                datasets: [
                    {
                        label: 'зӣ®жЁҷ',
                        data: targetData,
                        backgroundColor: '#5b7db3',
                        borderColor: '#4a6a9f',
                        borderWidth: 1,
                        borderRadius: 2,
                        stack: 'target',
                        order: 1,
                        barPercentage: 0.8,
                        categoryPercentage: 0.8
                    },
                    {
                        label: 'е®ҹзёҫ',
                        data: actualData,
                        backgroundColor: '#5ba378',
                        borderColor: '#4a8e62',
                        borderWidth: 1,
                        borderRadius: 0,
                        stack: 'forecast',
                        order: 2,
                        barPercentage: 0.8,
                        categoryPercentage: 0.8
                    },
                    {
                        label: wLabel,
                        data: wData,
                        backgroundColor: '#e8a87c',
                        borderColor: '#d89460',
                        borderWidth: 1,
                        borderRadius: 0,
                        stack: 'forecast',
                        order: 3,
                        barPercentage: 0.8,
                        categoryPercentage: 0.8
                    },
                    {
                        label: cLabel,
                        data: cData,
                        backgroundColor: '#e8e8e8',
                        borderColor: '#d0d0d0',
                        borderWidth: 1,
                        borderRadius: 0,
                        stack: 'forecast',
                        order: 4,
                        barPercentage: 0.8,
                        categoryPercentage: 0.8
                    },
                    {
                        label: bLabel,
                        data: bData,
                        backgroundColor: '#d4c4b0',
                        borderColor: '#c4b4a0',
                        borderWidth: 1,
                        borderRadius: [0, 0, 2, 2],
                        stack: 'forecast',
                        order: 5,
                        barPercentage: 0.8,
                        categoryPercentage: 0.8
                    }
                ]
            };
        }
        
        // гғҒгғЈгғјгғҲгӮ’жҸҸз”»
        function drawChart(data, canvasId) {
            if (!canvasId) canvasId = 'salesChart';
            const canvasEl = document.getElementById(canvasId);
            if (!canvasEl) {
                console.error('вқҢ гӮӯгғЈгғігғҗгӮ№иҰҒзҙ гҒҢиҰӢгҒӨгҒӢгӮҠгҒҫгҒӣгӮ“');
                return;
            }

            const ctx = canvasEl.getContext('2d');

            if (canvasId === 'salesChart' && chart) {
                chart.destroy();
            }
            
            const chartData = createChartData(data);
            console.log('гӮ°гғ©гғ•гғҮгғјгӮҝ:', chartData);
            
            try {
                const chartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: chartData,
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        indexAxis: 'x',
                        plugins: {
                            legend: {
                                display: true,
                                position: 'top',
                                labels: {
                                    usePointStyle: true,
                                    padding: 15,
                                    font: {
                                        size: 12,
                                        weight: '600'
                                    }
                                }
                            },
                            title: {
                                display: false
                            },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        if (context.parsed.y !== null && context.parsed.y !== 0) {
                                            return context.dataset.label + ': ' + context.parsed.y.toFixed(1) + 'зҷҫдёҮеҶҶ';
                                        }
                                        return '';
                                    }
                                }
                            }
                        },
                        scales: {
                            x: {
                                stacked: true,
                                ticks: {
                                    font: {
                                        size: 12
                                    }
                                },
                                grid: {
                                    display: false
                                }
                            },
                            y: {
                                stacked: true,
                                beginAtZero: true,
                                ticks: {
                                    callback: function(value) {
                                        return value.toLocaleString(undefined, {maximumFractionDigits: 0});
                                    },
                                    font: {
                                        size: 11
                                    }
                                },
                                title: {
                                    display: true,
                                    text: 'зҷҫдёҮеҶҶ',
                                    font: {
                                        size: 11
                                    }
                                }
                            }
                        }
                    },
                    plugins: [{
                        id: 'labelPlugin',
                        afterDatasetsDraw: function(chart) {
                            const ctx = chart.ctx;
                            const xScale = chart.scales.x;
                            const yScale = chart.scales.y;
                            const targetMeta = chart.getDatasetMeta(0); // зӣ®жЁҷ
                            const forecastMeta = chart.getDatasetMeta(1); // е®ҹзёҫ
                            
                            // еҗ„жңҲгҒ®гғ«гғјгғ—
                            for (let i = 0; i < chart.data.labels.length; i++) {
                                const label = chart.data.labels[i];
                                
                                // гғҮгғјгӮҝгӮ’еҸ–еҫ—
                                const targetVal = chart.data.datasets[0].data[i];
                                const actualVal = chart.data.datasets[1].data[i] || 0;
                                const wVal = chart.data.datasets[2].data[i] || 0;
                                const cVal = chart.data.datasets[3].data[i] || 0;
                                const bVal = chart.data.datasets[4].data[i] || 0;
                                
                                // гғ©гғҷгғ«гҒӢгӮүзҠ¶ж…ӢгӮ’еҲӨе®ҡ
                                const isActual = label.includes('е®ҹзёҫ');
                                const isForecast = label.includes('иҰӢиҫј');
                                
                                // зӣ®жЁҷгғҗгғјгҒ® X дҪҚзҪ®
                                const targetBar = targetMeta.data[i];
                                if (!targetBar) continue;
                                const targetBarX = targetBar.x;
                                
                                // иҰӢиҫјгғҗгғјгҒ® X дҪҚзҪ®
                                const forecastBar = forecastMeta.data[i];
                                const forecastBarX = forecastBar ? forecastBar.x : targetBarX;
                                
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'middle';
                                
                                // ===== зӣ®жЁҷгҒ®ж•°еӯ—пјҲдёҠйғЁгҒ«иЎЁзӨәпјү =====
                                if (targetVal && targetVal > 0) {
                                    ctx.fillStyle = '#2c3e50';
                                    ctx.font = 'bold 15px Arial';
                                    const yPos = yScale.getPixelForValue(targetVal);
                                    ctx.fillText(Math.round(targetVal), targetBarX, yPos - 8);
                                }
                                
                                // ===== еҗ„гӮ»гӮ°гғЎгғігғҲгҒ®еҖӨгӮ’гӮ»гӮ°гғЎгғігғҲеҶ…гҒ«иЎЁзӨә =====
                                if (isForecast) {
                                    // гӮ»гӮ°гғЎгғігғҲеҶ…гҒ®еҖӨз”ЁгҒ®гғ•гӮ©гғігғҲпјҲеӨ§гҒҚгӮҒпјү
                                    ctx.font = 'bold 15px Arial';
                                    
                                    // W 90% гҒ®иЎЁзӨәдҪҚзҪ®гҒЁеҖӨ
                                    if (wVal > 0) {
                                        ctx.fillStyle = '#2c3e50';
                                        const wStart = actualVal;
                                        const wEnd = actualVal + wVal;
                                        const wMidpoint = (wStart + wEnd) / 2;
                                        const wYPos = yScale.getPixelForValue(wMidpoint);
                                        ctx.fillText(Math.round(wVal), forecastBarX, wYPos);
                                    }
                                    
                                    // C 80% гҒ®иЎЁзӨәдҪҚзҪ®гҒЁеҖӨпјҲй»’зі»гҒ§иЎЁзӨәпјү
                                    if (cVal > 0) {
                                        ctx.fillStyle = '#2c3e50';
                                        const cStart = actualVal + wVal;
                                        const cEnd = actualVal + wVal + cVal;
                                        const cMidpoint = (cStart + cEnd) / 2;
                                        const cYPos = yScale.getPixelForValue(cMidpoint);
                                        ctx.fillText(Math.round(cVal), forecastBarX, cYPos);
                                    }
                                    
                                    // B 60% гҒ®иЎЁзӨәдҪҚзҪ®гҒЁеҖӨ
                                    if (bVal > 0) {
                                        ctx.fillStyle = '#2c3e50';
                                        const bStart = actualVal + wVal + cVal;
                                        const bEnd = actualVal + wVal + cVal + bVal;
                                        const bMidpoint = (bStart + bEnd) / 2;
                                        const bYPos = yScale.getPixelForValue(bMidpoint);
                                        ctx.fillText(Math.round(bVal), forecastBarX, bYPos);
                                    }
                                    
                                    // иҰӢиҫјгҒ®еҗҲиЁҲеҖӨпјҲдёҠйғЁгҒ«иЎЁзӨәпјү
                                    ctx.fillStyle = '#2c3e50';
                                    ctx.font = 'bold 15px Arial';
                                    const total = actualVal + wVal + cVal + bVal;
                                    if (total > 0) {
                                        const yPos = yScale.getPixelForValue(total);
                                        ctx.fillText(Math.round(total), forecastBarX, yPos - 8);
                                    }
                                } else if (isActual) {
                                    // е®ҹзёҫгҒ®еҗҲиЁҲеҖӨпјҲдёҠйғЁгҒ«иЎЁзӨәпјү
                                    ctx.fillStyle = '#2c3e50';
                                    ctx.font = 'bold 15px Arial';
                                    const yPos = yScale.getPixelForValue(actualVal);
                                    ctx.fillText(Math.round(actualVal), forecastBarX, yPos - 8);
                                }
                            }
                        }
                    }]
                });
                if (canvasId === 'salesChart') chart = chartInstance;
                console.log('вң“ гӮ°гғ©гғ•жҸҸз”»жҲҗеҠҹ');
            } catch (error) {
                console.error('вқҢ гӮ°гғ©гғ•жҸҸз”»гӮЁгғ©гғј:', error);
                alert('гӮ°гғ©гғ•гҒ®жҸҸз”»гҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹгҖӮгӮігғігӮҪгғјгғ«гӮ’зўәиӘҚгҒ—гҒҰгҒҸгҒ гҒ•гҒ„гҖӮ');
            }
        }

        // гғҶгғјгғ–гғ«гӮ’з”ҹжҲҗ
        function createTable(data, tableId) {
            const tbody = document.querySelector((tableId ? '#' + tableId : '#dataTable') + ' tbody');
            tbody.innerHTML = '';
            
            for (let i = 0; i < data.labels.length; i++) {
                const row = document.createElement('tr');
                const status = data.statuses[i];
                const label = data.labels[i];
                
                const target = formatThousand(data.targets[i]);
                const actual = formatThousand(data.actuals[i]);
                const w = formatThousand(data.w_forecasts[i] || 0);
                const c = formatThousand(data.c_forecasts[i] || 0);
                const b = formatThousand(data.b_forecasts[i] || 0);
                const total = actual + w + c + b;
                
                if (status === "е®ҹзёҫ") {
                    row.className = 'status-actual';
                } else if (status === "иҰӢиҫј") {
                    row.className = 'status-forecast';
                }
                
                const wHtml = w > 0 ? `<td>${w.toLocaleString()}</td>` : '<td class="zero-value">-</td>';
                const cHtml = c > 0 ? `<td>${c.toLocaleString()}</td>` : '<td class="zero-value">-</td>';
                const bHtml = b > 0 ? `<td>${b.toLocaleString()}</td>` : '<td class="zero-value">-</td>';
                const totalHtml = total > 0 ? `<td><strong>${total.toLocaleString()}</strong></td>` : '<td class="zero-value">-</td>';
                
                row.innerHTML = `
                    <td><strong>${label}</strong></td>
                    <td>${target.toLocaleString()}</td>
                    <td>${actual > 0 ? actual.toLocaleString() : '-'}</td>
                    ${wHtml}
                    ${cHtml}
                    ${bHtml}
                    ${totalHtml}
                `;
                
                tbody.appendChild(row);
            }
        }
        
        // з¬¬2гғҒгғЈгғјгғҲпјҡеҪ“жңҲиҰӢиҫји©ізҙ°пјҲжЈ’гӮ°гғ©гғ•пјӢзӣ®жЁҷжЁӘз·ҡпјү
        function drawDetailChart(detail) {
            const ctx = document.getElementById('detailChart').getContext('2d');
            const labels = detail.items.map(i => i.label);
            const values = detail.items.map(i => formatMillion(i.value));
            const targetM = formatMillion(detail.target);
            const targetLabel = `зӣ®жЁҷ ${(targetM / 100).toFixed(1)}е„„еҶҶ`;

            const colors = ['#b0c4de', '#e8a87c', '#5ba378', '#5b7db3'];

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'йҮ‘йЎҚ',
                        data: values,
                        backgroundColor: colors,
                        borderWidth: 1,
                        borderRadius: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: {
                        padding: { top: 30, bottom: 10 }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: ctx => `${ctx.parsed.y.toFixed(1)}зҷҫдёҮеҶҶ`
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { font: { size: 12 } }
                        },
                        y: {
                            beginAtZero: true,
                            ticks: { callback: v => `${v}M` }
                        }
                    }
                },
                plugins: [
                    {
                        // жЈ’гӮ°гғ©гғ•дёҠгҒ®еҖӨгғ©гғҷгғ«
                        id: 'detailValueLabel',
                        afterDatasetsDraw(chart) {
                            const { ctx, scales: { y } } = chart;
                            chart.getDatasetMeta(0).data.forEach((bar, i) => {
                                const val = values[i];
                                ctx.save();
                                ctx.fillStyle = '#2c3e50';
                                ctx.font = 'bold 13px Arial';
                                ctx.textAlign = 'center';
                                ctx.fillText(`${val.toFixed(1)}M`, bar.x, y.getPixelForValue(val) - 8);
                                ctx.restore();
                            });
                        }
                    },
                    {
                        // зӣ®жЁҷжЁӘз·ҡпјӢгғ©гғҷгғ«гӮ’зӣҙжҺҘжҸҸз”»
                        id: 'targetLinePlugin',
                        afterDraw(chart) {
                            const { ctx, chartArea, scales: { y } } = chart;
                            const yPos = y.getPixelForValue(targetM);

                            // з ҙз·ҡгӮ’жҸҸз”»
                            ctx.save();
                            ctx.strokeStyle = '#e74c3c';
                            ctx.lineWidth = 2;
                            ctx.setLineDash([6, 4]);
                            ctx.beginPath();
                            ctx.moveTo(chartArea.left, yPos);
                            ctx.lineTo(chartArea.right, yPos);
                            ctx.stroke();
                            ctx.setLineDash([]);

                            // гғ©гғҷгғ«иғҢжҷҜгҒЁж–Үеӯ—гӮ’жҸҸз”»
                            ctx.font = 'bold 12px Arial';
                            const textW = ctx.measureText(targetLabel).width;
                            const px = 8, py = 4;
                            const boxW = textW + px * 2;
                            const boxH = 22;
                            const boxX = chartArea.left + 4;
                            const boxY = yPos - boxH / 2;

                            ctx.fillStyle = '#e74c3c';
                            ctx.beginPath();
                            ctx.roundRect(boxX, boxY, boxW, boxH, 4);
                            ctx.fill();

                            ctx.fillStyle = '#ffffff';
                            ctx.textAlign = 'left';
                            ctx.textBaseline = 'middle';
                            ctx.fillText(targetLabel, boxX + px, yPos);
                            ctx.restore();
                        }
                    }
                ]
            });
        }

        // з¬¬2гғҶгғјгғ–гғ«пјҡеҪ“жңҲиҰӢиҫји©ізҙ°
        function createDetailTable(detail) {
            const tbody = document.querySelector('#detailTable tbody');
            tbody.innerHTML = '';
            const target = detail.target;

            // зӣ®жЁҷиЎҢ
            const targetRow = document.createElement('tr');
            targetRow.style.fontWeight = 'bold';
            targetRow.style.background = '#eaf0fb';
            targetRow.innerHTML = `
                <td>зӣ®жЁҷ</td>
                <td>${Math.round(target / 1000).toLocaleString()}</td>
                <td>-</td>
            `;
            tbody.appendChild(targetRow);

            detail.items.forEach(item => {
                const ratio = target > 0 ? (item.value / target * 100).toFixed(1) : '-';
                const overTarget = item.value >= target;
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${item.label}</strong></td>
                    <td>${Math.round(item.value / 1000).toLocaleString()}</td>
                    <td style="color:${overTarget ? '#27ae60' : '#e74c3c'}; font-weight:bold">${ratio}%</td>
                `;
                tbody.appendChild(row);
            });
        }

        // йҒ”жҲҗзҺҮгҒ«еҝңгҒҳгҒҹиүІгӮҠиҝ”гҒҷ
        function rateColor(rate) {
            if (rate >= 80) return '#27ae60';
            if (rate >= 50) return '#f39c12';
            return '#e74c3c';
        }

        // жЁҷжә–йҖІжҚ—гҒЁгҒ®жҜ”ијғгҒ§4иүІгӮ’иҝ”гҒҷ
        // еӨ§гҒҚгҒҸдёҠеӣһгӮӢ(stdГ—1.5д»ҘдёҠ):жҝғз·‘ / дёҠеӣһгӮӢ:з·‘ / гӮ„гӮ„дёӢеӣһгӮӢ(stdГ—0.5д»ҘдёҠ):ж©ҷ / еӨ§гҒҚгҒҸдёӢеӣһгӮӢ:иөӨ
        function rateColorVsStd(rate, std) {
            if (rate >= std * 1.5) return '#1a7a3d';  // еӨ§гҒҚгҒҸдёҠеӣһгӮӢпјҡжҝғгҒ„з·‘
            if (rate >= std)       return '#27ae60';  // дёҠеӣһгӮӢпјҡз·‘
            if (rate >= std * 0.5) return '#f39c12';  // гӮ„гӮ„дёӢеӣһгӮӢпјҡж©ҷ
            return '#e74c3c';                          // еӨ§гҒҚгҒҸдёӢеӣһгӮӢпјҡиөӨ
        }

        // жЁҷжә–йҖІжҚ—гғҗгғҠгғјгӮ’жҸҸз”»пјҲaccountSummaryгҒЁеҗҢгӮ№гӮҝгӮӨгғ«пјү
        function drawStdProgressBanner(std, accounts, ab, workingElapsed, workingTotal) {
            const el = document.getElementById('stdProgressBanner');
            if (!el) return;

            const today = new Date();
            const m     = today.getMonth() + 1;
            const d     = today.getDate();
            const pct   = Math.min(std, 100).toFixed(1);

            el.innerHTML = `
                <span class="summary-label">жЁҷжә–йҖІжҚ—</span>
                <span class="summary-numbers">${m}жңҲ${d}ж—ҘгҖҖ${workingElapsed}еҠҙеғҚж—Ҙ / ${workingTotal}еҠҙеғҚж—Ҙ</span>
                <span class="summary-rate" style="color:#555">${std}%</span>
                <div class="summary-bar-wrap">
                    <div class="summary-bar-fill" style="width:${pct}%;background:#95a5a6"></div>
                </div>
            `;
        }

        // з¬¬3гғҒгғЈгғјгғҲпјҡгӮўгӮ«гғ—гғ©Top20 жЁӘжЈ’гӮ°гғ©гғ•пјҲзӣ®жЁҷгғ»е®ҹзёҫгҒ®2гғҗгғјгҖҒйҮ‘йЎҚгғҷгғјгӮ№пјү
        function drawAccountChart(accounts, stdProgress) {
            const ctx = document.getElementById('accountChart').getContext('2d');
            const std = stdProgress || 0;

            // зӣ®жЁҷйҮ‘йЎҚгҒ®еӨҡгҒ„й ҶгҒ«гӮҪгғјгғҲ
            const items = [...accounts].sort((a, b) => b.target - a.target);

            // 20зӨҫеҗҲиЁҲгӮөгғһгғӘгғјгӮ«гғјгғү
            const totalTarget  = accounts.reduce((s, a) => s + a.target, 0);
            const totalActual  = accounts.reduce((s, a) => s + a.actual, 0);
            const totalRate    = totalTarget > 0 ? (totalActual / totalTarget * 100) : 0;
            const summaryEl    = document.getElementById('accountSummary');
            const summaryColor = rateColorVsStd(totalRate, std);
            const barPct       = Math.min(totalRate, 100).toFixed(1);
            summaryEl.innerHTML = `
                <span class="summary-label">Top20зӨҫеҗҲиЁҲ</span>
                <span class="summary-numbers">е®ҹзёҫ ${(totalActual/1000000).toFixed(1)}M / зӣ®жЁҷ ${(totalTarget/1000000).toFixed(1)}M</span>
                <span class="summary-rate" style="color:${summaryColor}">${totalRate.toFixed(1)}%</span>
                <div class="summary-bar-wrap">
                    <div class="summary-bar-fill" style="width:${barPct}%;background:${summaryColor}"></div>
                </div>
            `;

            const names       = items.map(a => a.name);
            const targetVals  = items.map(a => Math.round(a.target / 1000000 * 10) / 10);
            const actualVals  = items.map(a => Math.round(a.actual / 1000000 * 10) / 10);
            const actualColors = items.map(a => rateColorVsStd(a.rate, std));

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: names,
                    datasets: [
                        {
                            label: 'зӣ®жЁҷ',
                            data: targetVals,
                            backgroundColor: 'rgba(180,200,230,0.5)',
                            borderColor: 'rgba(140,170,210,0.9)',
                            borderWidth: 1,
                            borderRadius: 3,
                            categoryPercentage: 0.8,
                            barPercentage: 0.8
                        },
                        {
                            label: 'е®ҹзёҫ',
                            data: actualVals,
                            backgroundColor: actualColors,
                            borderColor: actualColors,
                            borderWidth: 1,
                            borderRadius: 3,
                            categoryPercentage: 0.8,
                            barPercentage: 0.8
                        }
                    ]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: { padding: { right: 200 } },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                generateLabels: () => [
                                    { text: 'зӣ®жЁҷ', fillStyle: 'rgba(180,200,230,0.6)', strokeStyle: 'rgba(140,170,210,0.8)', lineWidth: 1 },
                                    { text: `жҝғз·‘пјҡжЁҷжә–гҒ®1.5еҖҚ(${Math.round(std*1.5*10)/10}%)д»ҘдёҠ`, fillStyle: '#1a7a3d', strokeStyle: '#1a7a3d', lineWidth: 0 },
                                    { text: `з·‘пјҡжЁҷжә–(${std}%)д»ҘдёҠ`, fillStyle: '#27ae60', strokeStyle: '#27ae60', lineWidth: 0 },
                                    { text: `ж©ҷпјҡжЁҷжә–гҒ®еҚҠеҲҶ(${Math.round(std*0.5*10)/10}%)д»ҘдёҠ`, fillStyle: '#f39c12', strokeStyle: '#f39c12', lineWidth: 0 },
                                    { text: `иөӨпјҡжЁҷжә–гҒ®еҚҠеҲҶжңӘжәҖ`, fillStyle: '#e74c3c', strokeStyle: '#e74c3c', lineWidth: 0 }
                                ]
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: ctx => {
                                    const a = items[ctx.dataIndex];
                                    return `е®ҹзёҫ ${(a.actual/1000000).toFixed(1)}M / зӣ®жЁҷ ${(a.target/1000000).toFixed(1)}MгҖҖйҒ”жҲҗзҺҮ ${a.rate}%`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            ticks: { callback: v => `${v}M` }
                        },
                        y: { ticks: { font: { size: 11 } } }
                    }
                },
                plugins: [{
                    id: 'accountLabels',
                    afterDatasetsDraw(chart) {
                        const { ctx: c, scales: { x } } = chart;
                        const metaTarget = chart.getDatasetMeta(0);
                        const metaActual = chart.getDatasetMeta(1);

                        items.forEach((item, i) => {
                            const targetBar = metaTarget.data[i];
                            const actualBar = metaActual.data[i];
                            if (!targetBar || !actualBar) return;

                            const targetX = x.getPixelForValue(targetVals[i]);
                            const actualX = x.getPixelForValue(actualVals[i]);
                            const color   = rateColorVsStd(item.rate, std);

                            c.save();
                            c.textAlign    = 'left';
                            c.textBaseline = 'middle';

                            // зӣ®жЁҷгғҗгғјгҒ®еҸігҒ«зӣ®жЁҷйҮ‘йЎҚ
                            c.font      = '11px Arial';
                            c.fillStyle = '#777';
                            c.fillText(`${targetVals[i].toFixed(1)}M`, targetX + 6, targetBar.y);

                            // е®ҹзёҫгғҗгғјгҒ®еҸігҒ«е®ҹзёҫйҮ‘йЎҚпјӢйҒ”жҲҗзҺҮ
                            const actualLabel = `${actualVals[i].toFixed(1)}M`;
                            c.font      = '11px Arial';
                            c.fillStyle = '#444';
                            c.fillText(actualLabel, actualX + 6, actualBar.y);

                            c.font      = 'bold 12px Arial';
                            c.fillStyle = color;
                            const lw = c.measureText(actualLabel).width;
                            c.fillText(`${item.rate}%`, actualX + 6 + lw + 6, actualBar.y);

                            c.restore();
                        });
                    }
                }]
            });
        }

        // з¬¬4гғҒгғЈгғјгғҲпјҡеӣӣеҚҠжңҹ еҸ—жіЁзІ—еҲ©
        function drawQuarterChart(q) {
            const ctx = document.getElementById('quarterChart').getContext('2d');

            const hasPrevQ = q.prev_q_actual > 0;

            // 2Qгғўгғјгғү: еүҚQзӣ®жЁҷгғ»еүҚQе®ҹзёҫгӮ’е·Ұз«ҜгҒ«иҝҪеҠ 
            const labels = hasPrevQ
                ? [q.prev_q_label + 'зӣ®жЁҷ', q.prev_q_label + 'е®ҹзёҫ', q.quarter_label + 'зӣ®жЁҷ', q.forecast_label, q.logic_label]
                : [q.quarter_label, q.forecast_label, q.logic_label];

            const pTarget  = hasPrevQ ? formatMillion(q.prev_q_target) : 0;
            const pActual  = hasPrevQ ? formatMillion(q.prev_q_actual) : 0;
            const target   = formatMillion(q.target);
            const fActual  = formatMillion(q.forecast_actual);
            const fWorst   = formatMillion(q.forecast_worst);
            const fCommit  = formatMillion(q.forecast_commit);
            const fBest    = formatMillion(q.forecast_best);
            const lActual  = formatMillion(q.logic_actual);
            const lW       = formatMillion(q.logic_w);
            const lC       = formatMillion(q.logic_c);
            const lB       = formatMillion(q.logic_b);

            const BAR_W = 130;
            // иҰӢиҫјгғҗгғјгҒ®иүІпјҲWorst/Commit/BestпјүвҖ” гӮ°гғӘгғјгғігғ»гғ–гғ«гғјгғ»гғ”гғігӮҜзі»гҒ§гғӯгӮёгғғгӮҜгҒЁеҢәеҲҘ
            const C_WORST  = '#7ec8a0';  // гғҹгғігғҲгӮ°гғӘгғјгғі
            const C_COMMIT = '#7eb5e8';  // гӮігғјгғігғ•гғ©гғҜгғјгғ–гғ«гғј
            const C_BEST   = '#f0a0b8';  // гӮҪгғ•гғҲгғ”гғігӮҜ
            // гғӯгӮёгғғгӮҜгғҗгғјгҒ®иүІпјҲW%/C%/B%пјүвҖ” гӮ°гғ©гғ•1гҒ® W/C/B гҒЁеҗҢдёҖиүІ
            const C_W = '#e8a87c';       // гӮ°гғ©гғ•1 W гҒЁеҗҢгҒҳпјҲгӮӘгғ¬гғігӮёпјү
            const C_C = '#e8e8e8';       // гӮ°гғ©гғ•1 C гҒЁеҗҢгҒҳпјҲгғ©гӮӨгғҲгӮ°гғ¬гғјпјү
            const C_B = '#d4c4b0';       // гӮ°гғ©гғ•1 B гҒЁеҗҢгҒҳпјҲгғҷгғјгӮёгғҘпјү

            // вҳ… е…ЁdatasetгҒ«еҗҢдёҖ stack:'q' гӮ’иЁӯе®ҡгҒҷгӮӢгҒ“гҒЁгҒ§гҖҒеҗ„гӮ«гғҶгӮҙгғӘгҒ®жЈ’гҒҢ
            //    гғ©гғҷгғ«гҒ®зңҹдёҠгҒ«дёӯеӨ®жҸғгҒҲгҒ§иЎЁзӨәгҒ•гӮҢгӮӢпјҲгғһгғ«гғҒгӮ№гӮҝгғғгӮҜдҪҚзҪ®гӮәгғ¬еӣһйҒҝпјү
            let datasets, targetIdx, fBarIdx, lBarIdx, hideLegendIdx;
            if (hasPrevQ) {
                // 2Qгғўгғјгғү: 5жЈ’пјҲеүҚQзӣ®жЁҷ / еүҚQе®ҹзёҫ / еҪ“Qзӣ®жЁҷ / еҪ“QиҰӢиҫј / еҪ“QиҰӢиҫјгғӯгӮёгғғгӮҜпјү
                datasets = [
                    { label: q.prev_q_label + 'зӣ®жЁҷ', data: [pTarget, null,    null,    null,    null],    backgroundColor: '#5b7db3', stack: 'q', borderWidth: 1, borderRadius: 2,           barThickness: BAR_W },
                    { label: q.prev_q_label + 'е®ҹзёҫ', data: [null,    pActual, null,    null,    null],    backgroundColor: '#5ba378', stack: 'q', borderWidth: 1, borderRadius: 2,           barThickness: BAR_W },
                    { label: q.quarter_label + 'зӣ®жЁҷ', data: [null,    null,    target,  null,    null],    backgroundColor: '#5b7db3', stack: 'q', borderWidth: 1, borderRadius: 2,           barThickness: BAR_W },
                    { label: 'е®ҹзёҫ',                   data: [null,    null,    null,    fActual, null],    backgroundColor: '#5ba378', stack: 'q', borderWidth: 1, borderRadius: 0,            barThickness: BAR_W },
                    { label: 'Worst',                  data: [null,    null,    null,    fWorst,  null],    backgroundColor: C_WORST,   stack: 'q', borderWidth: 1, borderRadius: 0,            barThickness: BAR_W },
                    { label: 'Commit',                 data: [null,    null,    null,    fCommit, null],    backgroundColor: C_COMMIT,  stack: 'q', borderWidth: 1, borderRadius: 0,            barThickness: BAR_W },
                    { label: 'Best',                   data: [null,    null,    null,    fBest,   null],    backgroundColor: C_BEST,    stack: 'q', borderWidth: 1, borderRadius: [0, 0, 2, 2], barThickness: BAR_W },
                    { label: 'е®ҹзёҫ ',                  data: [null,    null,    null,    null,    lActual], backgroundColor: '#5ba378', stack: 'q', borderWidth: 1, borderRadius: 0,            barThickness: BAR_W },
                    { label: q.logic_w_label,          data: [null,    null,    null,    null,    lW],      backgroundColor: C_W,       stack: 'q', borderWidth: 1, borderRadius: 0,            barThickness: BAR_W },
                    { label: q.logic_c_label,          data: [null,    null,    null,    null,    lC],      backgroundColor: C_C,       stack: 'q', borderWidth: 1, borderRadius: 0,            barThickness: BAR_W },
                    { label: q.logic_b_label,          data: [null,    null,    null,    null,    lB],      backgroundColor: C_B,       stack: 'q', borderWidth: 1, borderRadius: [0, 0, 2, 2], barThickness: BAR_W }
                ];
                targetIdx = 2; fBarIdx = 3; lBarIdx = 7; hideLegendIdx = 7;
            } else {
                // 1Qгғўгғјгғү: 3жЈ’пјҲеҪ“Qзӣ®жЁҷ / еҪ“QиҰӢиҫј / еҪ“QиҰӢиҫјгғӯгӮёгғғгӮҜпјү
                datasets = [
                    { label: 'зӣ®жЁҷ',          data: [target, null,    null],    backgroundColor: '#5b7db3', stack: 'q', borderWidth: 1, borderRadius: 2,           barThickness: BAR_W },
                    { label: 'е®ҹзёҫ',          data: [null,   fActual, null],    backgroundColor: '#5ba378', stack: 'q', borderWidth: 1, borderRadius: 0,            barThickness: BAR_W },
                    { label: 'Worst',         data: [null,   fWorst,  null],    backgroundColor: C_WORST,   stack: 'q', borderWidth: 1, borderRadius: 0,            barThickness: BAR_W },
                    { label: 'Commit',        data: [null,   fCommit, null],    backgroundColor: C_COMMIT,  stack: 'q', borderWidth: 1, borderRadius: 0,            barThickness: BAR_W },
                    { label: 'Best',          data: [null,   fBest,   null],    backgroundColor: C_BEST,    stack: 'q', borderWidth: 1, borderRadius: [0, 0, 2, 2], barThickness: BAR_W },
                    { label: 'е®ҹзёҫ ',         data: [null,   null,    lActual], backgroundColor: '#5ba378', stack: 'q', borderWidth: 1, borderRadius: 0,            barThickness: BAR_W },
                    { label: q.logic_w_label, data: [null,   null,    lW],      backgroundColor: C_W,       stack: 'q', borderWidth: 1, borderRadius: 0,            barThickness: BAR_W },
                    { label: q.logic_c_label, data: [null,   null,    lC],      backgroundColor: C_C,       stack: 'q', borderWidth: 1, borderRadius: 0,            barThickness: BAR_W },
                    { label: q.logic_b_label, data: [null,   null,    lB],      backgroundColor: C_B,       stack: 'q', borderWidth: 1, borderRadius: [0, 0, 2, 2], barThickness: BAR_W }
                ];
                targetIdx = 0; fBarIdx = 1; lBarIdx = 5; hideLegendIdx = 5;
            }

            new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: { padding: { top: 35, bottom: 10 } },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                // е®ҹзёҫгҒ®йҮҚиӨҮпјҲгғӯгӮёгғғгӮҜгғҗгғјеҒҙпјүгӮ’йқһиЎЁзӨә
                                filter: item => item.datasetIndex !== hideLegendIdx,
                                usePointStyle: true,
                                padding: 15,
                                font: { size: 12, weight: '600' }
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: ctx => ctx.parsed.y !== null ? `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}зҷҫдёҮеҶҶ` : ''
                            }
                        }
                    },
                    scales: {
                        x: {
                            stacked: true,
                            ticks: { font: { size: 13 } },
                            grid: { display: false }
                        },
                        y: {
                            stacked: true,
                            beginAtZero: true,
                            ticks: {
                                callback: v => v.toLocaleString(undefined, { maximumFractionDigits: 0 }),
                                font: { size: 11 }
                            },
                            title: { display: true, text: 'зҷҫдёҮеҶҶ', font: { size: 11 } }
                        }
                    }
                },
                plugins: [{
                    id: 'quarterLabelPlugin',
                    afterDatasetsDraw(chart) {
                        const { ctx: c, scales: { y } } = chart;
                        c.textAlign = 'center';
                        c.textBaseline = 'middle';
                        c.font = 'bold 15px Arial';
                        c.fillStyle = '#2c3e50';

                        // еүҚQзӣ®жЁҷгғ»еүҚQе®ҹзёҫгғҗгғјдёҠйғЁгғ©гғҷгғ«пјҲ2QгғўгғјгғүгҒ®гҒҝпјү
                        if (hasPrevQ) {
                            const ptBar = chart.getDatasetMeta(0).data[0];
                            if (ptBar && pTarget > 0) {
                                c.fillText(Math.round(pTarget), ptBar.x, y.getPixelForValue(pTarget) - 10);
                            }
                            const pBar = chart.getDatasetMeta(1).data[1];
                            if (pBar && pActual > 0) {
                                c.fillText(Math.round(pActual), pBar.x, y.getPixelForValue(pActual) - 10);
                            }
                        }

                        // зӣ®жЁҷгғҗгғјдёҠйғЁгғ©гғҷгғ«
                        const tBarIdx = hasPrevQ ? 2 : 0;
                        const targetBar = chart.getDatasetMeta(tBarIdx).data[hasPrevQ ? 2 : 0];
                        if (targetBar && target > 0) {
                            c.fillText(Math.round(target), targetBar.x, y.getPixelForValue(target) - 10);
                        }

                        // иҰӢиҫјгғҗгғјпјҡеҗ„гӮ»гӮ°гғЎгғігғҲеҶ…гғ©гғҷгғ«пјӢеҗҲиЁҲ
                        const fLabelIdx = hasPrevQ ? 3 : 1;
                        const fBar = chart.getDatasetMeta(fBarIdx).data[fLabelIdx];
                        if (fBar) {
                            const bx = fBar.x;
                            if (fActual > 0)  c.fillText(Math.round(fActual),  bx, y.getPixelForValue(fActual / 2));
                            if (fWorst > 0)   c.fillText(Math.round(fWorst),   bx, y.getPixelForValue(fActual + fWorst / 2));
                            if (fCommit > 0)  c.fillText(Math.round(fCommit),  bx, y.getPixelForValue(fActual + fWorst + fCommit / 2));
                            if (fBest > 0)    c.fillText(Math.round(fBest),    bx, y.getPixelForValue(fActual + fWorst + fCommit + fBest / 2));
                            const fTotal = fActual + fWorst + fCommit + fBest;
                            if (fTotal > 0)   c.fillText(Math.round(fTotal),   bx, y.getPixelForValue(fTotal) - 10);
                        }

                        // иҰӢиҫјгғӯгӮёгғғгӮҜгғҗгғјпјҡеҗ„гӮ»гӮ°гғЎгғігғҲеҶ…гғ©гғҷгғ«пјӢеҗҲиЁҲ
                        const lLabelIdx = hasPrevQ ? 4 : 2;
                        const lBar = chart.getDatasetMeta(lBarIdx).data[lLabelIdx];
                        if (lBar) {
                            const bx = lBar.x;
                            if (lActual > 0)  c.fillText(Math.round(lActual),  bx, y.getPixelForValue(lActual / 2));
                            if (lW > 0)       c.fillText(Math.round(lW),       bx, y.getPixelForValue(lActual + lW / 2));
                            if (lC > 0)       c.fillText(Math.round(lC),       bx, y.getPixelForValue(lActual + lW + lC / 2));
                            if (lB > 0)       c.fillText(Math.round(lB),       bx, y.getPixelForValue(lActual + lW + lC + lB / 2));
                            const lTotal = lActual + lW + lC + lB;
                            if (lTotal > 0)   c.fillText(Math.round(lTotal),   bx, y.getPixelForValue(lTotal) - 10);
                        }
                    }
                }]
            });
        }

        // з¬¬4гғҶгғјгғ–гғ«пјҡеӣӣеҚҠжңҹ еҸ—жіЁзІ—еҲ©
        function createQuarterTable(q) {
            const tbody = document.querySelector('#quarterTable tbody');
            tbody.innerHTML = '';

            // гғҳгғғгғҖгғјгҒ® W/C/B еҲ—еҗҚгӮ’е®ҹйҡӣгҒ®гғ©гғҷгғ«еҗҚгҒ§жӣҙж–°
            const ths = document.querySelectorAll('#quarterTable thead th');
            ths[3].textContent = `Worst / ${q.logic_w_label} (еҚғеҶҶ)`;
            ths[4].textContent = `Commit / ${q.logic_c_label} (еҚғеҶҶ)`;
            ths[5].textContent = `Best / ${q.logic_b_label} (еҚғеҶҶ)`;

            const target  = formatThousand(q.target);
            const fActual = formatThousand(q.forecast_actual);
            const fWorst  = formatThousand(q.forecast_worst);
            const fCommit = formatThousand(q.forecast_commit);
            const fBest   = formatThousand(q.forecast_best);
            const fTotal  = fActual + fWorst + fCommit + fBest;
            const lActual = formatThousand(q.logic_actual);
            const lW      = formatThousand(q.logic_w);
            const lC      = formatThousand(q.logic_c);
            const lB      = formatThousand(q.logic_b);
            const lTotal  = lActual + lW + lC + lB;

            const fmt = v => v > 0 ? v.toLocaleString() : '<span class="zero-value">-</span>';

            // еүҚQе®ҹзёҫиЎҢпјҲ2QгғўгғјгғүгҒ®гҒҝпјү
            if (q.prev_q_actual > 0) {
                const pActual = formatThousand(q.prev_q_actual);
                const pRatio  = target > 0 ? (pActual / target * 100).toFixed(1) + '%' : '-';
                const prevRow = document.createElement('tr');
                prevRow.style.background = '#edf5e8';
                prevRow.innerHTML = `
                    <td><strong>${q.prev_q_label || 'еүҚQе®ҹзёҫ'}</strong></td>
                    <td>${target.toLocaleString()}</td>
                    <td><strong>${pActual.toLocaleString()}</strong></td>
                    <td colspan="3" class="zero-value">-</td>
                    <td><strong>${pActual.toLocaleString()}</strong></td>
                    <td><strong>${pRatio}</strong></td>
                `;
                tbody.appendChild(prevRow);
            }

            // зӣ®жЁҷиЎҢ
            const targetRow = document.createElement('tr');
            targetRow.style.fontWeight = 'bold';
            targetRow.style.background = '#eaf0fb';
            targetRow.innerHTML = `
                <td><strong>зӣ®жЁҷ</strong></td>
                <td>${target.toLocaleString()}</td>
                <td colspan="4" class="zero-value">-</td>
                <td class="zero-value">-</td>
                <td class="zero-value">-</td>
            `;
            tbody.appendChild(targetRow);

            // пј‘QиҰӢиҫјиЎҢ
            const fRatio = target > 0 ? (fTotal / target * 100).toFixed(1) + '%' : '-';
            const fRow = document.createElement('tr');
            fRow.className = 'status-forecast';
            fRow.innerHTML = `
                <td><strong>${q.forecast_label}</strong></td>
                <td>${target.toLocaleString()}</td>
                <td>${fmt(fActual)}</td>
                <td>${fmt(fWorst)}</td>
                <td>${fmt(fCommit)}</td>
                <td>${fmt(fBest)}</td>
                <td><strong>${fTotal.toLocaleString()}</strong></td>
                <td><strong>${fRatio}</strong></td>
            `;
            tbody.appendChild(fRow);

            // пј‘QиҰӢиҫјпјҲгғӯгӮёгғғгӮҜпјүиЎҢ
            const lRatio = target > 0 ? (lTotal / target * 100).toFixed(1) + '%' : '-';
            const lRow = document.createElement('tr');
            lRow.className = 'status-forecast';
            lRow.innerHTML = `
                <td><strong>${q.logic_label}</strong></td>
                <td>${target.toLocaleString()}</td>
                <td>${fmt(lActual)}</td>
                <td>${fmt(lW)}</td>
                <td>${fmt(lC)}</td>
                <td>${fmt(lB)}</td>
                <td><strong>${lTotal.toLocaleString()}</strong></td>
                <td><strong>${lRatio}</strong></td>
            `;
            tbody.appendChild(lRow);
        }

        // гғЎгӮӨгғіеҮҰзҗҶ
        function init() {
            console.log('===гғҖгғғгӮ·гғҘгғңгғјгғүиӘӯгҒҝиҫјгҒҝй–Ӣе§Ӣ===');
            
            const data = loadData();
            if (!data) {
                console.error('вқҢ гғҮгғјгӮҝгҒҢиӘӯгҒҝиҫјгҒҫгӮҢгҒҫгҒӣгӮ“');
                return;
            }
            
            console.log('гғҮгғјгӮҝеҸ–еҫ—жҲҗеҠҹ:', {
                жңҲж•°: data.labels.length,
                гғ©гғҷгғ«: data.labels,
                гӮ№гғҶгғјгӮҝгӮ№: data.statuses
            });
            
            // гӮҝгӮӨгғҲгғ«гӮ’жӣҙж–°
            if (data.title1) document.getElementById('mainTitle').textContent = data.title1;
            if (data.title2) document.getElementById('detailTitle').textContent = data.title2;

            // жӣҙж–°ж—ҘжҷӮгӮ’иЎЁзӨә
            document.getElementById('updatedTime').textContent = data.updated_at;
            if (data.accounts_updated) {
                document.getElementById('accountsUpdatedTime').textContent = data.accounts_updated;
            }
            console.log('вң“ жӣҙж–°ж—ҘжҷӮгӮ’иЎЁзӨә:', data.updated_at);
            
            // еүІеҗҲгғ©гғҷгғ«гӮ’жӣҙж–°
            updatePercentageLabels(data);
            
            // гғҒгғЈгғјгғҲгӮ’жҸҸз”»
            console.log('гӮ°гғ©гғ•гӮ’жҸҸз”»дёӯ...');
            drawChart(data);
            
            // гғҶгғјгғ–гғ«гӮ’з”ҹжҲҗ
            console.log('гғҶгғјгғ–гғ«гӮ’з”ҹжҲҗдёӯ...');
            createTable(data);

            // з¬¬2гғҒгғЈгғјгғҲгҒЁз¬¬2гғҶгғјгғ–гғ«гӮ’з”ҹжҲҗ
            if (data.detail) {
                drawDetailChart(data.detail);
                createDetailTable(data.detail);
            }

            // з¬¬3гғҒгғЈгғјгғҲпјҡгӮўгӮ«гғ—гғ©Top20
            if (data.accounts && data.accounts.length > 0) {
                if (data.title3) document.getElementById('accountTitle').textContent = data.title3;

                const std            = data.std_progress || 0;
                const workingElapsed = data.working_days_elapsed || 0;
                const workingTotal   = data.working_days_total || 0;

                // жЁҷжә–йҖІжҚ—гғҗгғҠгғјпјҲгӮ»гӮҜгӮ·гғ§гғі3гҒ®е…Ҳй ӯпјү
                drawStdProgressBanner(std, data.accounts, data.ab_summary, workingElapsed, workingTotal);

                drawAccountChart(data.accounts, std);

                // A&Bгғ©гғігӮҜгӮөгғһгғӘгғјгӮ«гғјгғү
                if (data.ab_summary && data.ab_summary.name) {
                    const ab      = data.ab_summary;
                    const abColor = rateColorVsStd(ab.rate, std);
                    const abPct = Math.min(ab.rate, 100).toFixed(1);
                    document.getElementById('abSummary').innerHTML = `
                        <span class="summary-label">${ab.name}</span>
                        <span class="summary-numbers">е®ҹзёҫ ${(ab.actual/1000000).toFixed(1)}M / зӣ®жЁҷ ${(ab.target/1000000).toFixed(1)}M</span>
                        <span class="summary-rate" style="color:${abColor}">${ab.rate}%</span>
                        <div class="summary-bar-wrap">
                            <div class="summary-bar-fill" style="width:${abPct}%;background:${abColor}"></div>
                        </div>
                    `;
                } else {
                    document.getElementById('abSummary').style.display = 'none';
                }
            }

            // з¬¬4гғҒгғЈгғјгғҲпјҡеӣӣеҚҠжңҹ еҸ—жіЁзІ—еҲ©
            if (data.quarter) {
                if (data.title4) document.getElementById('quarterTitle').textContent = data.title4;
                drawQuarterChart(data.quarter);
                createQuarterTable(data.quarter);
            }

            // з¬¬5гӮ»гӮҜгӮ·гғ§гғіпјҡж–°иҰҸж–Ҫзӯ– жңҲж¬Ў еҸ—жіЁзІ—еҲ©
            if (data.newbiz_labels && data.newbiz_labels.length > 0) {
                if (data.title5) document.getElementById('newbizTitle').textContent = data.title5;
                const wP5 = Math.round((data.newbiz_w_percentage || 1) * 100);
                const cP5 = Math.round((data.newbiz_c_percentage || 0.8) * 100);
                const bP5 = Math.round((data.newbiz_b_percentage || 0.4) * 100);
                document.getElementById('newbizThW').textContent = `W ${wP5}% (еҚғеҶҶ)`;
                document.getElementById('newbizThC').textContent = `C ${cP5}% (еҚғеҶҶ)`;
                document.getElementById('newbizThB').textContent = `B ${bP5}% (еҚғеҶҶ)`;
                const newbizData = {
                    labels: data.newbiz_labels,
                    statuses: data.newbiz_statuses,
                    targets: data.newbiz_targets,
                    actuals: data.newbiz_actuals,
                    w_forecasts: data.newbiz_w_forecasts || [],
                    c_forecasts: data.newbiz_c_forecasts || [],
                    b_forecasts: data.newbiz_b_forecasts || [],
                    w_percentage: data.newbiz_w_percentage,
                    c_percentage: data.newbiz_c_percentage,
                    b_percentage: data.newbiz_b_percentage
                };
                drawChart(newbizData, 'newbizChart');
                createTable(newbizData, 'newbizTable');
            }

            // з¬¬6гӮ»гӮҜгӮ·гғ§гғіпјҡж–°иҰҸж–Ҫзӯ–пјҲиІҙзӨҫеҗҚпјү жңҲж¬Ў еҸ—жіЁзІ—еҲ©
            if (data.newbiz2_labels && data.newbiz2_labels.length > 0) {
                if (data.title6) document.getElementById('newbiz2Title').textContent = data.title6;
                const wP6 = Math.round((data.newbiz2_w_percentage || 1) * 100);
                const cP6 = Math.round((data.newbiz2_c_percentage || 0.8) * 100);
                const bP6 = Math.round((data.newbiz2_b_percentage || 0.4) * 100);
                document.getElementById('newbiz2ThW').textContent = `W ${wP6}% (еҚғеҶҶ)`;
                document.getElementById('newbiz2ThC').textContent = `C ${cP6}% (еҚғеҶҶ)`;
                document.getElementById('newbiz2ThB').textContent = `B ${bP6}% (еҚғеҶҶ)`;
                const newbiz2Data = {
                    labels: data.newbiz2_labels,
                    statuses: data.newbiz2_statuses,
                    targets: data.newbiz2_targets,
                    actuals: data.newbiz2_actuals,
                    w_forecasts: data.newbiz2_w_forecasts || [],
                    c_forecasts: data.newbiz2_c_forecasts || [],
                    b_forecasts: data.newbiz2_b_forecasts || [],
                    w_percentage: data.newbiz2_w_percentage,
                    c_percentage: data.newbiz2_c_percentage,
                    b_percentage: data.newbiz2_b_percentage
                };
                drawChart(newbiz2Data, 'newbiz2Chart');
                createTable(newbiz2Data, 'newbiz2Table');
            }

            // гӮ»гӮҜгӮ·гғ§гғі7гҖң11 е…ұйҖҡжҸҸз”»гғҳгғ«гғ‘гғј
            function drawAnalysisSection(num, data) {
                const key = `sec${num}`;
                if (!data[`${key}_labels`] || data[`${key}_labels`].length === 0) return;
                if (data[`title${num}`]) document.getElementById(`${key}Title`).textContent = data[`title${num}`];
                const wP = Math.round((data[`${key}_w_percentage`] || 1) * 100);
                const cP = Math.round((data[`${key}_c_percentage`] || 0.8) * 100);
                const bP = Math.round((data[`${key}_b_percentage`] || 0.4) * 100);
                document.getElementById(`${key}ThW`).textContent = `W ${wP}% (еҚғеҶҶ)`;
                document.getElementById(`${key}ThC`).textContent = `C ${cP}% (еҚғеҶҶ)`;
                document.getElementById(`${key}ThB`).textContent = `B ${bP}% (еҚғеҶҶ)`;
                const secData = {
                    labels:       data[`${key}_labels`],
                    statuses:     data[`${key}_statuses`],
                    targets:      data[`${key}_targets`],
                    actuals:      data[`${key}_actuals`],
                    w_forecasts:  data[`${key}_w_forecasts`] || [],
                    c_forecasts:  data[`${key}_c_forecasts`] || [],
                    b_forecasts:  data[`${key}_b_forecasts`] || [],
                    w_percentage: data[`${key}_w_percentage`],
                    c_percentage: data[`${key}_c_percentage`],
                    b_percentage: data[`${key}_b_percentage`]
                };
                drawChart(secData, `${key}Chart`);
                createTable(secData, `${key}Table`);
            }

            [7, 8, 9, 10, 11].forEach(n => drawAnalysisSection(n, data));

            // гӮ»гӮҜгӮ·гғ§гғі12гғ»13пјҲеҚҳдёҖиҰӢиҫјгӮ°гғ©гғ•пјү
            function drawSimpleForecastChart(canvasId, secData) {
                const { labels, statuses, targets, actuals, forecasts } = secData;
                // жңҖеӨ§еҖӨгҒ§еҚҳдҪҚгӮ’иҮӘеӢ•еҲӨе®ҡ: 100,000д»ҘдёҠгҒӘгӮүеҶҶвҶ’зҷҫдёҮеҶҶгҒ«еӨүжҸӣгҖҒжңӘжәҖгҒҜгҒқгҒ®гҒҫгҒҫиЎЁзӨә
                const maxVal = Math.max(...targets, ...actuals, ...forecasts.map(v => v || 0));
                const isYen = maxVal >= 100000;
                const toDisp = v => isYen ? formatMillion(v) : v;
                const yAxisLabel = isYen ? 'зҷҫдёҮеҶҶ' : '';
                const tooltipUnit = isYen ? 'зҷҫдёҮеҶҶ' : '';

                const targetData = [], actualData = [], forecastData = [];
                for (let i = 0; i < labels.length; i++) {
                    targetData.push(toDisp(targets[i]));
                    if (statuses[i] === 'е®ҹзёҫ') {
                        actualData.push(toDisp(actuals[i]));
                        forecastData.push(null);
                    } else if (statuses[i] === 'иҰӢиҫј') {
                        actualData.push(null);
                        forecastData.push(toDisp(forecasts[i]));
                    } else {
                        actualData.push(null);
                        forecastData.push(null);
                    }
                }
                const ctx = document.getElementById(canvasId).getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels,
                        datasets: [
                            { label: 'зӣ®жЁҷ', data: targetData, backgroundColor: '#5b7db3', borderColor: '#4a6a9f', borderWidth: 1, borderRadius: 2, stack: 'target', barPercentage: 0.8, categoryPercentage: 0.8 },
                            { label: 'е®ҹзёҫ', data: actualData, backgroundColor: '#5ba378', borderColor: '#4a8e62', borderWidth: 1, borderRadius: 2, stack: 'forecast', barPercentage: 0.8, categoryPercentage: 0.8 },
                            { label: 'иҰӢиҫј', data: forecastData, backgroundColor: '#e8a87c', borderColor: '#d89460', borderWidth: 1, borderRadius: 2, stack: 'forecast', barPercentage: 0.8, categoryPercentage: 0.8 }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        layout: { padding: { top: 40 } },
                        plugins: {
                            legend: { display: true, position: 'top', labels: { usePointStyle: true, padding: 15, font: { size: 12, weight: '600' } } },
                            tooltip: { callbacks: { label: c => c.parsed.y !== null && c.parsed.y !== 0 ? `${c.dataset.label}: ${c.parsed.y.toFixed(isYen ? 1 : 0)}${tooltipUnit}` : '' } }
                        },
                        scales: {
                            x: { stacked: true, ticks: { font: { size: 12 } }, grid: { display: false } },
                            y: { stacked: true, beginAtZero: true, ticks: { callback: v => v.toLocaleString() }, title: { display: !!yAxisLabel, text: yAxisLabel, font: { size: 11 } } }
                        }
                    },
                    plugins: [{
                        id: 'simpleLabelPlugin_' + canvasId,
                        afterDatasetsDraw(chart) {
                            const { ctx: c, scales: { y } } = chart;
                            const targetMeta = chart.getDatasetMeta(0);
                            const actualMeta = chart.getDatasetMeta(1);
                            const forecastMeta = chart.getDatasetMeta(2);
                            for (let i = 0; i < labels.length; i++) {
                                const tVal = targetData[i];
                                const aVal = actualData[i];
                                const fVal = forecastData[i];
                                c.save();
                                c.textAlign = 'center';
                                // зӣ®жЁҷеҖӨпјҲдёҠйғЁпјү
                                if (tVal && tVal > 0) {
                                    const tBar = targetMeta.data[i];
                                    if (tBar) {
                                        c.fillStyle = '#2c3e50';
                                        c.font = 'bold 13px Arial';
                                        c.fillText(Math.round(tVal), tBar.x, y.getPixelForValue(tVal) - 6);
                                    }
                                }
                                // е®ҹзёҫеҖӨпјӢйҒ”жҲҗзҺҮпјҲдёҠйғЁпјү
                                if (aVal && aVal > 0) {
                                    const aBar = actualMeta.data[i];
                                    if (aBar) {
                                        const rate = tVal > 0 ? Math.round(aVal / tVal * 100) : 0;
                                        const rateColor = rate >= 100 ? '#27ae60' : (rate >= 70 ? '#f39c12' : '#e74c3c');
                                        c.font = 'bold 12px Arial';
                                        c.fillStyle = '#2c3e50';
                                        c.fillText(Math.round(aVal), aBar.x, y.getPixelForValue(aVal) - 20);
                                        c.font = 'bold 13px Arial';
                                        c.fillStyle = rateColor;
                                        c.fillText(rate + '%', aBar.x, y.getPixelForValue(aVal) - 6);
                                    }
                                }
                                // иҰӢиҫјеҖӨпјҲдёҠйғЁпјү
                                if (fVal && fVal > 0) {
                                    const fBar = forecastMeta.data[i];
                                    if (fBar) {
                                        c.fillStyle = '#2c3e50';
                                        c.font = 'bold 13px Arial';
                                        c.fillText(Math.round(fVal), fBar.x, y.getPixelForValue(fVal) - 6);
                                    }
                                }
                                c.restore();
                            }
                        }
                    }]
                });
            }

            function createSimpleForecastTable(tableId, secData) {
                const tbody = document.querySelector('#' + tableId + ' tbody');
                tbody.innerHTML = '';
                const { labels, statuses, targets, actuals, forecasts } = secData;
                const maxVal = Math.max(...targets, ...actuals, ...forecasts.map(v => v || 0));
                const isYen = maxVal >= 100000;
                const toTbl = v => isYen ? formatThousand(v) : v;
                labels.forEach((label, i) => {
                    const t = toTbl(targets[i]);
                    const a = toTbl(actuals[i]);
                    const f = toTbl(forecasts[i]);
                    const isActual = statuses[i] === 'е®ҹзёҫ';
                    const isForecast = statuses[i] === 'иҰӢиҫј';
                    let rateHtml = '<span class="zero-value">-</span>';
                    if (isActual && t > 0 && a > 0) {
                        const r = (a / t * 100);
                        const color = r >= 100 ? '#27ae60' : (r >= 70 ? '#f39c12' : '#e74c3c');
                        rateHtml = `<span style="color:${color};font-weight:bold">${r.toFixed(1)}%</span>`;
                    }
                    const fmt = v => v > 0 ? v.toLocaleString() : '<span class="zero-value">-</span>';
                    const row = document.createElement('tr');
                    if (isActual) row.className = 'status-actual';
                    if (isForecast) row.className = 'status-forecast';
                    row.innerHTML = `
                        <td>${label}</td>
                        <td>${fmt(t)}</td>
                        <td>${isActual ? fmt(a) : '<span class="zero-value">-</span>'}</td>
                        <td>${isForecast ? fmt(f) : '<span class="zero-value">-</span>'}</td>
                        <td>${rateHtml}</td>
                    `;
                    tbody.appendChild(row);
                });
            }

            [12, 13].forEach(n => {
                const lblKey = `sec${n}_labels`;
                if (!data[lblKey] || data[lblKey].length === 0) return;
                if (data[`title${n}`]) document.getElementById(`sec${n}Title`).textContent = data[`title${n}`];
                const secData = {
                    labels:    data[`sec${n}_labels`],
                    statuses:  data[`sec${n}_statuses`],
                    targets:   data[`sec${n}_targets`],
                    actuals:   data[`sec${n}_actuals`],
                    forecasts: data[`sec${n}_forecasts`] || []
                };
                // гғҶгғјгғ–гғ«гғҳгғғгғҖгғјгҒ®еҚҳдҪҚгӮ’иӘҝж•ҙ
                const maxVal = Math.max(...secData.targets, ...secData.actuals, ...secData.forecasts.map(v => v || 0));
                const isYen = maxVal >= 100000;
                const unit = isYen ? 'еҚғеҶҶ' : '';
                const ths = document.querySelectorAll(`#sec${n}Table thead th`);
                if (ths[1]) ths[1].textContent = unit ? `зӣ®жЁҷ (${unit})` : 'зӣ®жЁҷ';
                if (ths[2]) ths[2].textContent = unit ? `е®ҹзёҫ (${unit})` : 'е®ҹзёҫ';
                if (ths[3]) ths[3].textContent = unit ? `иҰӢиҫј (${unit})` : 'иҰӢиҫј';
                drawSimpleForecastChart(`sec${n}Chart`, secData);
                createSimpleForecastTable(`sec${n}Table`, secData);
            });

            console.log('===гғҖгғғгӮ·гғҘгғңгғјгғүиӘӯгҒҝиҫјгҒҝе®ҢдәҶ===');
        }
        
        // гғҡгғјгӮёиӘӯгҒҝиҫјгҒҝжҷӮгҒ«е®ҹиЎҢ
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
